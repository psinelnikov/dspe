version: "3.8"

services:
  extension-tee:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6660:6660"
      - "6661:6661"
      - "6662:6662"
      - "6676:6676"
    environment:
      - CONFIG_PORT=6660
      - SIGN_PORT=6661
      - EXTENSION_PORT=6662
      - MODE=1
      - FLARE_RPC_URL=${FLARE_RPC_URL:-https://coston2-api.flare.network/ext/C/rpc}
      - POLICY_REGISTRY_ADDR=${POLICY_REGISTRY_ADDR}
      - AUDIT_LOG_ADDR=${AUDIT_LOG_ADDR}
      - EXPLORER_API_URL=${EXPLORER_API_URL:-https://coston2-explorer.flare.network/api}
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
